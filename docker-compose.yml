networks:
    nginx_network:
    internal:

services:
    user-upload-app:
        container_name: user-upload-app
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        restart: always
        networks:
            - internal
            - nginx_network
        volumes:
            - .:/app
        depends_on:
            pgsql:
                condition: service_healthy
            redis:
                condition: service_healthy
        environment:
            DB_HOST: pgsql
            REDIS_HOST: redis

    user-upload-nginx:
        image: nginx:alpine
        container_name: user-upload-nginx
        restart: always
        networks:
            - internal
            - nginx_network
        ports:
            - "8000:80"
        volumes:
            - .:/app
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - user-upload-app

    redis:
        image: redis:7-alpine
        container_name: user-upload-redis
        restart: always
        networks:
            - internal
        ports:
            - "6379:6379"
        volumes:
            - redisdata:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 5s
            retries: 5

    pgsql:
        image: postgres:15
        container_name: user-upload-pgsql
        restart: always
        networks:
            - internal
        environment:
            POSTGRES_USER: ${DB_USERNAME}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
            POSTGRES_DB: ${DB_DATABASE}
        volumes:
            - pgdata:/var/lib/postgresql/data
        ports:
            - "5432:5432"
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
            interval: 5s
            timeout: 5s
            retries: 5

volumes:
    pgdata:
    redisdata:
